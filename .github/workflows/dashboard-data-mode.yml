name: Dashboard data mode

on:
  push:
    branches:
      - runtime/dashboard-data-mode
  pull_request:
    paths:
      - 'api/dashboard/**'
      - 'dashboard/**'
      - 'lib/dashboard-bootstrap.js'
      - 'tests/dashboard-data-mode.test.js'
      - 'scripts/capture-dashboard-screenshots.mjs'
      - '.github/workflows/dashboard-data-mode.yml'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Apply optional-number mapper correction
        if: github.event_name == 'push'
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('lib/dashboard-bootstrap.js')
          text = path.read_text()
          old = """function numberValue(page, names, fallback) {
            const value = plain(firstProperty(page, names));
            const parsed = Number(value);
            return Number.isFinite(parsed) ? parsed : (fallback === undefined ? null : fallback);
          }"""
          new = """function numberValue(page, names, fallback) {
            const value = plain(firstProperty(page, names));
            if (value === null || value === undefined || value === '') {
              return fallback === undefined ? null : fallback;
            }
            const parsed = Number(value);
            return Number.isFinite(parsed) ? parsed : (fallback === undefined ? null : fallback);
          }"""
          if old in text:
            path.write_text(text.replace(old, new, 1))
          elif new not in text:
            raise SystemExit('numberValue mapper shape changed unexpectedly')
          PY

      - name: Run dashboard unit tests
        run: node tests/dashboard-data-mode.test.js

      - name: Check JavaScript syntax
        run: |
          node --check api/dashboard/bootstrap.js
          node --check lib/dashboard-bootstrap.js
          node --check dashboard/dashboard-data-adapter.js
          node --check dashboard/dashboard-data-mode-init.js

      - name: Install screenshot runtime
        if: github.event_name == 'push'
        run: |
          npm install --no-save playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Start static dashboard server
        if: github.event_name == 'push'
        run: |
          python3 -m http.server 4173 >/tmp/dashboard-server.log 2>&1 &
          sleep 2

      - name: Capture desktop and mobile screenshots
        if: github.event_name == 'push'
        run: node scripts/capture-dashboard-screenshots.mjs

      - name: Commit corrected mapper and screenshots to branch
        if: github.event_name == 'push'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add lib/dashboard-bootstrap.js docs/screenshots/dashboard-data-mode-desktop.png docs/screenshots/dashboard-data-mode-mobile.png
          if git diff --cached --quiet; then
            echo 'Generated artifacts unchanged.'
          else
            git commit -m 'Fix dashboard number mapping and add screenshots'
            git push
          fi
