name: Dashboard data mode

on:
  pull_request:
    paths:
      - 'api/dashboard/**'
      - 'dashboard/**'
      - 'dashboard.html'
      - 'dashboard.css'
      - 'data/app-config.json'
      - 'data/dashboard-nav.js'
      - 'data/demo/**'
      - 'lib/dashboard-bootstrap.js'
      - 'tests/dashboard-data-mode.test.js'
      - 'tests/dashboard-shell.test.js'
      - 'scripts/capture-dashboard-screenshots.mjs'
      - '.github/workflows/dashboard-data-mode.yml'
      - 'vercel.json'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run dashboard data-mode tests
        run: node tests/dashboard-data-mode.test.js

      - name: Run dashboard shell tests
        run: node tests/dashboard-shell.test.js

      - name: Check JavaScript syntax
        run: |
          node --check api/dashboard/bootstrap.js
          node --check lib/dashboard-bootstrap.js
          node --check dashboard.js
          node --check dashboard/api-client.js
          node --check dashboard/dashboard-config.js
          node --check dashboard/dashboard-renderers.js
          node --check dashboard/dashboard-data-adapter.js
          node --check dashboard/dashboard-data-mode-init.js

      - name: Validate JSON configuration
        run: |
          node -e "JSON.parse(require('fs').readFileSync('data/app-config.json', 'utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('data/demo/dashboard-demo-data.json', 'utf8'))"
          node -e "JSON.parse(require('fs').readFileSync('vercel.json', 'utf8'))"
