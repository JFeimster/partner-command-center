openapi: 3.1.0
info:
  title: Partner Signup Copilot Actions
  version: 1.0.2
  description: Partner-only GPT Action schema for submitting partner signup profiles into Partner Command Center. This is not for borrower funding applications or lead routing.
servers:
  - url: https://partner-command-center-rho.vercel.app
    description: Partner Command Center production
paths:
  /api/partner-signup:
    post:
      operationId: submitPartnerSignup
      summary: Submit a partner signup profile
      description: Creates or updates a partner profile, classifies partner type, assigns onboarding context, and logs a Partner Event. Not for borrower applications.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required:
                - partner
              properties:
                partner:
                  type: object
                  additionalProperties: false
                  required:
                    - email
                  properties:
                    first_name:
                      type: string
                      maxLength: 120
                      description: Partner first name.
                    last_name:
                      type: string
                      maxLength: 120
                      description: Partner last name.
                    email:
                      type: string
                      format: email
                      maxLength: 254
                      description: Required partner email address.
                    phone:
                      type: string
                      maxLength: 50
                      description: Partner phone number.
                    company:
                      type: string
                      maxLength: 180
                      description: Partner company, brand, or organization.
                    website:
                      type: string
                      maxLength: 300
                      description: Partner website, public profile, or brand URL.
                    partner_type_claimed:
                      type: string
                      maxLength: 120
                      description: How the partner describes their role, such as funding_broker, referral_partner, affiliate_partner, cpa_bookkeeper, real_estate_professional, ecommerce_consultant, community_connector, vendor_partner, or strategic_partner.
                    audience:
                      type: string
                      maxLength: 600
                      description: Who the partner serves or reaches.
                    industry:
                      type: string
                      maxLength: 200
                      description: Partner industry or operating niche.
                    location:
                      type: string
                      maxLength: 160
                      description: Partner city, region, or market.
                    funding_experience:
                      type: string
                      maxLength: 800
                      description: Partner experience referring business owners to funding education, resources, or trusted contacts.
                    current_tools:
                      type: string
                      maxLength: 800
                      description: Tools, platforms, or channels the partner already uses.
                    traffic_or_network_size:
                      type: string
                      maxLength: 500
                      description: Approximate audience, client base, or network size.
                    referral_volume_estimate:
                      type: string
                      maxLength: 300
                      description: Estimated warm referral volume.
                    desired_partner_role:
                      type: string
                      maxLength: 700
                      description: How the partner wants to participate.
                    notes:
                      type: string
                      maxLength: 1000
                      description: Additional partner context. Do not include borrower application data or sensitive information.
                    source:
                      type: string
                      maxLength: 80
                      default: gpt_action
                      description: Signup source. Use gpt_action for ChatGPT submissions.
            example:
              partner:
                first_name: Morgan
                last_name: Lee
                email: morgan@example.com
                phone: '+1-555-010-2200'
                company: Lee Capital Referrals
                website: https://broker.example.com
                partner_type_claimed: funding_broker
                audience: Business owners seeking working capital education and funding readiness help.
                industry: Commercial finance and small business advisory.
                location: Atlanta, GA
                funding_experience: Experienced broker with active client conversations and a weekly referral process.
                current_tools: CRM, email outreach, referral forms, partner links.
                traffic_or_network_size: Local network plus broker relationships.
                referral_volume_estimate: 10 to 20 qualified referrals per month.
                desired_partner_role: Refer qualified business owners and use partner tracking links.
                notes: Ready to launch this month and wants broker onboarding resources.
                source: gpt_action
      responses:
        '201':
          description: Partner signup stored or updated.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  ok:
                    type: boolean
                  data:
                    type: object
                    additionalProperties: false
                    properties:
                      action:
                        type: string
                      result:
                        type: string
                      storage_action:
                        type: string
                      partner_id:
                        type: string
                      partner:
                        type: object
                        additionalProperties: false
                        properties:
                          partner_id:
                            type: string
                          name:
                            type: string
                          email:
                            type: string
                          company:
                            type: string
                          partner_type:
                            type: string
                          audience:
                            type: string
                          status:
                            type: string
                          tier:
                            type: string
                          onboarding_path:
                            type: string
                          resource_recommendations:
                            type: array
                            items:
                              type: string
                          campaign_recommendations:
                            type: array
                            items:
                              type: string
        '400':
          description: Validation error.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  ok:
                    type: boolean
                  error:
                    type: object
                    additionalProperties: false
                    properties:
                      code:
                        type: string
                      message:
                        type: string
        '401':
          description: Unauthorized.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  ok:
                    type: boolean
                  error:
                    type: object
                    additionalProperties: false
                    properties:
                      code:
                        type: string
                      message:
                        type: string
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  ok:
                    type: boolean
                  error:
                    type: object
                    additionalProperties: false
                    properties:
                      code:
                        type: string
                      message:
                        type: string
        '500':
          description: Server error.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  ok:
                    type: boolean
                  error:
                    type: object
                    additionalProperties: false
                    properties:
                      code:
                        type: string
                      message:
                        type: string
        '502':
          description: Notion request failed.
          content:
            application/json:
              schema:
                type: object
                additionalProperties: false
                properties:
                  ok:
                    type: boolean
                  error:
                    type: object
                    additionalProperties: false
                    properties:
                      code:
                        type: string
                      message:
                        type: string
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: PARTNER_COMMAND_API_KEY
      description: Use Authorization Bearer token with PARTNER_COMMAND_API_KEY.
  schemas: {}
